<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Pro - Fixed Version</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">🚗 <span>SmartPark Pro</span></div>
            <ul class="nav-menu">
                <li><a href="#dashboard" class="nav-link active">📊 Dashboard</a></li>
                <li><a href="#parking-status" class="nav-link">🅿️ Parking</a></li>
                <li><a href="#booking" class="nav-link">📅 Book</a></li>
                <li><a href="#admin" class="nav-link">⚙️ Admin</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Dashboard -->
        <section id="dashboard" class="section active">
            <div class="container">
                <h1>📊 Real-time Dashboard</h1>
                <div class="stats-grid">
                    <div class="stat-card available">
                        <i class="fas fa-parking"></i>
                        <span id="availableSlots">18</span>
                        <small>Available</small>
                    </div>
                    <div class="stat-card occupied">
                        <i class="fas fa-car-side"></i>
                        <span id="occupiedSlots">32</span>
                        <small>Occupied</small>
                    </div>
                    <div class="stat-card revenue">
                        <i class="fas fa-rupee-sign"></i>
                        <span id="totalRevenue">₹2450</span>
                        <small>Revenue</small>
                    </div>
                    <div class="stat-card users">
                        <i class="fas fa-users"></i>
                        <span id="totalUsers">12</span>
                        <small>Regular Users</small>
                    </div>
                </div>
            </div>
        </section>

        <!-- Parking Status -->
        <section id="parking-status" class="section">
            <div class="container">
                <h1>🅿️ Live Parking Status</h1>
                <div class="parking-grid" id="parkingGrid"></div>
            </div>
        </section>

        <!-- Booking -->
<form id="bookingForm">
    <input type="text" id="vehicleNumber" placeholder="Enter Vehicle No" required>
    
    <select id="floorSelect">
        <option value="1">Floor 1</option>
        <option value="2">Floor 2</option>
        <option value="3">Floor 3</option>
    </select>
    
    <input type="number" id="duration" value="2" min="1" max="24" required>

    <button type="submit">🚀 Book Now</button>
</form>

<div id="bookingStatus"></div>

        <!-- Admin -->
        <section id="admin" class="section">
            <div class="container">
                <h1>⚙️ Admin Panel</h1>
                <div class="admin-buttons">
                    <button onclick="showAllBookings()">📋 View Bookings</button>
                    <button onclick="clearAllData()">🗑️ Clear All Data</button>
                    <button onclick="exportData()">💾 Export Data</button>
                </div>
                <div id="adminContent"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
